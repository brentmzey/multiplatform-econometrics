name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Ensure only one run per PR/branch is running at a time to save costs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test, and Artifact
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'
        cache: 'gradle'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        cache-dependency-glob: "*.py"

    - name: Set up Python 3.11
      run: uv python install 3.11

    - name: Verify or Generate Datasets
      run: |
        uv run --with httpx --with fastapi --with jinja2 --with pandas --with linearmodels python generate_datasets.py || echo "generate_datasets.py failed or skipped"
      
    - name: Test Python Dashboard
      run: |
        uv run --with pytest --with fastapi --with httpx --with jinja2 --with python-multipart --with pandas --with pandas-datareader --with yfinance --with lxml --with seaborn --with matplotlib --with linearmodels pytest test_app.py

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Kotlin Backend and Tests
      run: ./gradlew build --no-daemon

    - name: Upload MVP Artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: econometrics-mvp
        path: |
          build/libs/*.jar
          static/
          templates/
          *.csv
          *.svg
          app.py
          charts_pipeline.py
          download_open_datasets.py
          start_*.sh
