name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

jobs:
  build_and_test:
    name: Build & Test
    runs-on: macos-latest # Needed for iOS targets
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Kotlin Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Build and Test All Targets
        run: ./gradlew check --no-daemon

      - name: Package Release Assets
        run: ./gradlew fatJar wasmJsBrowserDistribution --no-daemon

      - name: Upload Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ktor-Server-Jar
          path: build/libs/*fat.jar

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Web-WasmJs
          path: build/dist/wasmJs/productionExecutable/

  release:
    name: Create SemVer Release
    needs: build_and_test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Semantic Release
        run: npm install -g semantic-release @semantic-release/git @semantic-release/changelog @semantic-release/exec

      - name: Download Server Artifact
        uses: actions/download-artifact@v4
        with:
          name: Ktor-Server-Jar
          path: release-artifacts/server

      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: Web-WasmJs
          path: release-artifacts/web

      - name: Zip Web Artifacts
        run: zip -r release-artifacts/web.zip release-artifacts/web

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
