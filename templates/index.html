<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Econometrics Dashboard</title>
    <!-- CSS -->
    <link rel="stylesheet" href="/static/styles.css">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
</head>
<body x-data="{ isDownloading: false, isGenerating: false, isTesting: false, isLaunching: false }">
    <div class="container">
        <header>
            <h1>Econometrics Explorer</h1>
            <p class="subtitle">Interactive Causal Inference & Data Visualization</p>
        </header>

        <main>
            <div class="actions">
                <button class="btn" 
                        hx-post="/download" 
                        hx-target="#status" 
                        @click="isDownloading = true"
                        @htmx:after-request="isDownloading = false">
                    <span x-show="!isDownloading">⬇️ Download Datasets</span>
                    <span x-show="isDownloading">⏳ Downloading...</span>
                </button>

                <button class="btn btn-primary" 
                        hx-post="/generate-charts" 
                        hx-target="#gallery" 
                        @click="isGenerating = true"
                        @htmx:after-request="isGenerating = false">
                    <span x-show="!isGenerating">🎨 Generate Charts</span>
                    <span x-show="isGenerating">⏳ Generating...</span>
                </button>
                
                <button class="btn" 
                        hx-post="/backend-stats" 
                        hx-target="#status" 
                        @click="isTesting = true"
                        @htmx:after-request="isTesting = false">
                    <span x-show="!isTesting">🔗 Test Kotlin Backend</span>
                    <span x-show="isTesting">⏳ Connecting...</span>
                </button>

                <button class="btn btn-primary" 
                        hx-post="/launch-jupyter" 
                        hx-target="#status" 
                        @click="isLaunching = true"
                        @htmx:after-request="isLaunching = false"
                        style="background: linear-gradient(135deg, #f97316, #eab308);">
                    <span x-show="!isLaunching">📓 Launch Jupyter Notebooks</span>
                    <span x-show="isLaunching">⏳ Launching...</span>
                </button>
            </div>

            <div id="status" class="status-container">
                <!-- Status alerts will appear here -->
            </div>

            <div id="gallery">
                {% include 'chart_gallery.html' %}
            </div>
        </main>
    </div>
</body>
</html>
